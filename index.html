<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>廃棄層の発掘家 v17.5.5</title>
  <link rel="stylesheet" href="style.css?v=17.5.5">
</head>
<body>
  <main class="game">
    <section class="panel">
      <h1>廃棄層の発掘家 <span id="versionText" class="ver">Version: v17.5.5</span></h1>
      <div class="bars">
        <div class="bar"><span class="bar-label">HP</span><span class="bar-track"><span id="hpFill" class="bar-fill"></span></span><span id="hpText" class="bar-val">-</span></div>
        <div class="bar"><span class="bar-label">空腹</span><span class="bar-track"><span id="hungerFill" class="bar-fill"></span></span><span id="hungerText" class="bar-val">-</span></div>
        <div class="bar"><span class="bar-label">汚染</span><span class="bar-track"><span id="pollutionFill" class="bar-fill"></span></span><span id="pollutionText" class="bar-val">-</span></div>
      </div>
      <p id="statusText" class="status">深度 1 / HP 10/10</p>
      <p id="debugText" class="debug">debug: -</p>
    </section>

    <section class="screen-panel" id="screenPanel" hidden></section>

    <section class="play-area">
      <div class="game-stage">
        <canvas id="gameCanvas" width="672" height="480"></canvas>
        <div class="tap-zones" id="tapZones" aria-hidden="true">
          <span class="tap-zone" data-tap-dir="-1,-1"></span>
          <span class="tap-zone" data-tap-dir="0,-1"></span>
          <span class="tap-zone" data-tap-dir="1,-1"></span>
          <span class="tap-zone" data-tap-dir="-1,0"></span>
          <span class="tap-zone" data-tap-dir="0,0"></span>
          <span class="tap-zone" data-tap-dir="1,0"></span>
          <span class="tap-zone" data-tap-dir="-1,1"></span>
          <span class="tap-zone" data-tap-dir="0,1"></span>
          <span class="tap-zone" data-tap-dir="1,1"></span>
        </div>
      </div>
      <aside class="side">
        <h2>ミニマップ</h2>
        <canvas id="miniMapCanvas" width="240" height="160"></canvas>
        <p class="note">未踏破は黒。踏破済みのみ表示。</p>
      </aside>
    </section>

    <section class="hud">
      <section class="box" id="inventoryPanel"><h2>所持品</h2><p>なし</p></section>
      <section class="box" id="basePanel"><h2>拠点</h2><p>未集計</p></section>
      <section class="box" id="codexPanel"><h2>記録</h2><p>未記録</p></section>
      <section class="box log" id="logPanel"><p>発掘家は再構成された廃棄区域に足を踏み入れた。</p></section>
    </section>

    <p class="hint">スマホ基準: キャンバス全体を見えない9分割エリアとして扱う。NPCや敵のいる方向へ進むと、会話または攻撃を自動実行。中央は足踏み、足元に遺物があれば拾う。</p>
  </main>

  <script src="src/core.js?v=17.5.5"></script>
  <script src="src/systems.js?v=17.5.5"></script>
  <script src="src/ui.js?v=17.5.5"></script>
  <script src="src/game.js?v=17.5.5"></script>
</body>
</html>
